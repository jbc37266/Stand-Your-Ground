<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Joy Radio</title>

<style>
body{
    margin:0;
    background:#eef3f8;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.player{
    width:100%;
    max-width:380px;
    background:white;
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 12px 35px rgba(0,0,0,.15);
}

.topbar{
    background:#033256;
    color:white;
    padding:18px;
    text-align:center;
}

.logo{
    font-size:28px;
    font-weight:bold;
    letter-spacing:1px;
}

.content{
    padding:25px;
    text-align:center;
}

.song-title{
    font-size:22px;
    font-weight:bold;
    color:#033256;
    margin-bottom:25px;
}

audio{
    width:100%;
    margin-bottom:25px;
}

.back-button{
    display:inline-block;
    width:100%;
    padding:14px;
    border-radius:14px;
    background:#033256;
    color:white;
    text-decoration:none;
    font-weight:bold;
    box-sizing:border-box;
}

.footer{
    margin-top:18px;
    font-size:12px;
    color:#888;
}
</style>
</head>

<body>

<div class="player">

    <div class="topbar">
        <div class="logo">Joy Radio</div>
    </div>

    <div class="content">

        <div class="song-title">
            Stand Your Ground
        </div>

        <audio controls preload="auto">
            <source src="stand.mp3" type="audio/mpeg">
            Your browser does not support audio playback.
        </audio>

        <a class="back-button" href="https://joybaptist.church">
            ← Back To Joy Baptist Church
        </a>

        <div class="footer">
            Thanks for listening to Joy Radio
        </div>

    </div>

</div>

</body>
</html>
